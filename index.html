    { n: 37, tmdb: 986056, rating: 1.5, poster: "/hqcexYHbiTBfDIdDWxrxPtVndBX.jpg", title: "Thunderbolts",                       year: 2025, phase: "Phase 5", franchise: "Thunderbolts",    day: 10 },
    { n: 38, tmdb: 617126, rating: 2,   poster: "/abqOz6EL3yXyOOafCPZxjL1M5bQ.jpg", title: "The Fantastic 4: First Steps",       year: 2025, phase: "Phase 6", franchise: "Fantastic Four",  day: 10 },
  ];

  const dayDates = {
    1: "Apr 14", 2: "Apr 15", 3: "Apr 16", 4: "Apr 17", 5: "Apr 18",
    6: "Apr 19", 7: "Apr 20", 8: "Apr 22", 9: "Apr 23", 10: "Apr 24–25",
  };

  // ─── Ratings (baked into data) ────────────────────────────────────
  const ratingByTmdb = Object.fromEntries(movies.map(m => [m.tmdb, m.rating]));
  function getRating(tmdbId) { return ratingByTmdb[tmdbId] || 0; }

  // ─── Star SVG ─────────────────────────────────────────────────────
  const STAR_SVG = '<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';

  function renderStars(tmdbId) {
    const rating = getRating(tmdbId);
    let html = '<div class="stars">';
    for (let i = 1; i <= 5; i++) {
      const fillPct = Math.max(0, Math.min(1, rating - (i - 1))) * 100;
      html += `
        <div class="star">
          ${STAR_SVG}
          <div class="star-fill" style="width: ${fillPct}%">${STAR_SVG}</div>
        </div>
      `;
    }
    html += '</div>';
    return `<div class="stars-row">${html}</div>`;
  }

  // ─── Render Card ──────────────────────────────────────────────────
  function card(m, opts = {}) {
    const rating = getRating(m.tmdb);
    const ratingBadge = rating > 0
      ? `<span class="badge badge-rating-top">★ ${rating.toFixed(1)}</span>`
      : '';
    const rankBadge = opts.rankBadge != null
      ? `<span class="badge badge-rank">${opts.rankBadge}</span>` : '';
    const watchBadge = opts.watchBadge != null
      ? `<span class="badge badge-watch">${opts.watchBadge}</span>` : '';
    return `
      <div class="movie-card">
        <div class="poster-wrap">
          <img src="${TMDB(m.poster)}" alt="${m.title}" loading="lazy">
          ${rankBadge}${watchBadge}${ratingBadge}
        </div>
        <div class="title">${m.title}</div>
        <div class="meta"><span>${m.year}</span><span class="phase">${m.phase}</span></div>
        ${renderStars(m.tmdb)}
      </div>
    `;
  }

  // ─── Render: Chronological View ───────────────────────────────────
  function renderChrono() {
    const days = {};
    movies.forEach(m => {
      if (!days[m.day]) days[m.day] = [];
      days[m.day].push(m);
    });
    const html = Object.keys(days).sort((a,b)=>+a-+b).map(d => {
      const list = days[d];
      const cards = list.map(m => card(m, { rankBadge: m.n })).join('');
      return `
        <div class="day-section">
          <div class="day-header">
            <span class="day-number">DAY ${d}</span>
            <span class="day-date">${dayDates[d] || ''}</span>
            <span class="day-count">${list.length} film${list.length>1?'s':''}</span>
          </div>
          <div class="chrono-grid">${cards}</div>
        </div>
      `;
    }).join('');
    document.getElementById('chrono-content').innerHTML = html;
  }

  // ─── Render: Franchise View (sorted by avg rating desc) ──────────
  function renderFranchise() {
    const groups = {};
    movies.forEach(m => {
      if (!groups[m.franchise]) groups[m.franchise] = [];
      groups[m.franchise].push(m);
    });
    const enriched = Object.entries(groups).map(([name, list]) => {
      const rated = list.filter(m => getRating(m.tmdb) > 0);
      const avg = rated.length ? rated.reduce((s,m) => s + getRating(m.tmdb), 0) / rated.length : 0;
      // sort films within franchise by rating desc, unrated to end
      const sortedList = [...list].sort((a,b) => (getRating(b.tmdb) || -1) - (getRating(a.tmdb) || -1));
      return { name, list: sortedList, avg, count: list.length, ratedCount: rated.length };
    });
    // sort franchises by avg rating desc, unrated franchises by film count desc
    enriched.sort((a,b) => {
      if (a.avg !== b.avg) return b.avg - a.avg;
      return b.count - a.count;
    });
    const html = enriched.map((g, i) => {
      const cards = g.list.map((m, idx) => card(m, {
        rankBadge: getRating(m.tmdb) > 0 ? `#${idx+1}` : null,
        watchBadge: m.n,
      })).join('');
      const avgStr = g.avg > 0
        ? `★ ${g.avg.toFixed(2)} avg`
        : `<span style="color:#444">unrated</span>`;
      return `
        <div class="franchise-row">
          <div class="franchise-header">
            <span class="franchise-rank">#${i+1}</span>
            <span class="franchise-name">${g.name}</span>
            <span class="franchise-count">${g.count} film${g.count>1?'s':''}</span>
            <span class="franchise-avg">${avgStr}</span>
          </div>
          <div class="movie-scroll">${cards}</div>
        </div>
      `;
    }).join('');
    document.getElementById('franchise-content').innerHTML = html;
  }

  // ─── Render: Ranked View (Top 38) ────────────────────────────────
  function renderRanked() {
    const sorted = [...movies].sort((a, b) => {
      const ra = getRating(a.tmdb), rb = getRating(b.tmdb);
      if (rb !== ra) return rb - ra;
      return a.n - b.n; // tiebreak: chronological
    });
    // Tier definitions (S/A/B/C/D plus Unrated)
    const tierFor = (r) => {
      if (r === 0) return 'U';
      if (r >= 4.5) return 'S';
      if (r >= 4)   return 'A';
      if (r >= 3)   return 'B';
      if (r >= 2)   return 'C';
      return 'D';
    };
    const tierMeta = {
      S: { label: 'S TIER', desc: 'masterpieces (4.5–5★)' },
      A: { label: 'A TIER', desc: 'great (4–4.5★)' },
      B: { label: 'B TIER', desc: 'solid (3–3.5★)' },
      C: { label: 'C TIER', desc: 'mid (2–2.5★)' },
      D: { label: 'D TIER', desc: 'rough (0.5–1.5★)' },
      U: { label: 'UNRATED', desc: 'awaiting verdict' },
    };
    const tiers = { S: [], A: [], B: [], C: [], D: [], U: [] };
    sorted.forEach((m, i) => tiers[tierFor(getRating(m.tmdb))].push({ m, overall: i + 1 }));

    // Only render tiers that have movies
    const html = ['S', 'A', 'B', 'C', 'D', 'U']
      .filter(t => tiers[t].length > 0)
      .map(t => {
        const meta = tierMeta[t];
        const cards = tiers[t].map(({ m, overall }) => {
          const rating = getRating(m.tmdb);
          const overallBadge = rating > 0 ? `#${overall}` : null;
          return card(m, {
            rankBadge: overallBadge,
            watchBadge: m.n,
          });
        }).join('');
        return `
          <div class="ranked-tier">
            <div class="tier-header">
              <span class="tier-label tier-${t}">${meta.label}</span>
              <span class="tier-desc">${meta.desc}</span>
              <span class="tier-count">${tiers[t].length} film${tiers[t].length>1?'s':''}</span>
            </div>
            <div class="ranked-grid">${cards}</div>
          </div>
        `;
      }).join('');
    document.getElementById('ranked-content').innerHTML = html;
  }

  function renderAll() { renderChrono(); renderRanked(); renderFranchise(); }

  function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.querySelector(`[data-view="${name}"]`).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  renderAll();
</script>

</body>
